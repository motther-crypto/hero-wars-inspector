<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW Lite Inspector</title>
    <style>
        body {
            background-color: #111;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding: 50px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #0f0;
            padding: 30px;
            background-color: rgba(0,0,0,0.9);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            border-radius: 5px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #0f0;
            color: #000;
            text-decoration: none;
            padding: 15px 30px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 3px;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background-color: #0a0;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ HW Lite Inspector v5.1</h1>
        <p>Нажмите кнопку ниже, чтобы установить или обновить скрипт в вашем Tampermonkey:</p>
        <a href="inspector.user.js" class="btn">📥 УСТАНОВИТЬ СКРИПТ</a>
    </div>
</body>
</html>
